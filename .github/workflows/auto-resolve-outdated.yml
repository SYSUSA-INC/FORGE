name: Auto-resolve outdated Vercel Agent threads

# BL-QC-auto-resolve — eliminate the "All comments must be resolved"
# merge block for the case that drives 100% of the friction we've
# seen: a Vercel Agent review thread whose anchored code line was
# changed by a subsequent commit (GitHub marks it `isOutdated: true`)
# but the thread itself stays `isResolved: false` because GitHub
# never auto-resolves.
#
# What this workflow does:
#   - Fires on every push to a PR branch (pull_request: synchronize)
#   - Fetches all review threads on the PR via GraphQL
#   - Resolves threads where:
#         author of the FIRST comment == "vercel[bot]"
#         AND  thread.isOutdated == true
#         AND  thread.isResolved == false
#   - Leaves untouched:
#       - Vercel Agent threads that are NOT outdated (the fix didn't
#         touch the anchored line — live feedback, must address)
#       - Human-reviewer threads (regardless of outdated state)
#       - Threads where the first comment is not from vercel[bot]
#         (e.g. a human opened the thread and Vercel Agent replied)
#
# This is NOT a bypass:
#   - Vercel Agent still posts on every push
#   - Live (non-outdated) findings still block merge
#   - Human reviewers' comments still block merge
#   - All Tier-0 + Tier-2 + Tier-3 gates remain unchanged
#
# It only automates the "I acknowledged this is now outdated" click
# for Vercel Agent specifically, which GitHub already has the data
# to mark outdated but doesn't auto-resolve in the general case.

on:
  pull_request:
    types: [synchronize, opened, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: auto-resolve-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  resolve-outdated-vercel-threads:
    name: Resolve outdated vercel[bot] threads
    runs-on: ubuntu-latest
    steps:
      - name: Resolve threads
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const query = `
              query($owner: String!, $repo: String!, $number: Int!, $cursor: String) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    reviewThreads(first: 100, after: $cursor) {
                      pageInfo { hasNextPage endCursor }
                      nodes {
                        id
                        isResolved
                        isOutdated
                        comments(first: 1) {
                          nodes { author { login } }
                        }
                      }
                    }
                  }
                }
              }
            `;

            let cursor = null;
            let scanned = 0;
            let resolved = 0;
            let skippedAlreadyResolved = 0;
            let skippedLive = 0;
            let skippedNonVercel = 0;
            let errored = 0;

            while (true) {
              let page;
              try {
                const { repository } = await github.graphql(query, {
                  owner, repo, number: prNumber, cursor,
                });
                page = repository.pullRequest.reviewThreads;
              } catch (err) {
                core.error(`reviewThreads query failed: ${err.message ?? err}`);
                break;
              }

              for (const thread of page.nodes) {
                scanned += 1;
                if (thread.isResolved) {
                  skippedAlreadyResolved += 1;
                  continue;
                }
                const firstAuthor = thread.comments.nodes[0]?.author?.login;
                if (firstAuthor !== 'vercel[bot]') {
                  skippedNonVercel += 1;
                  continue;
                }
                if (!thread.isOutdated) {
                  skippedLive += 1;
                  continue;
                }
                // Outdated + unresolved + vercel[bot]-initiated → resolve.
                // Per-thread try/catch so one mutation failure (e.g. a race
                // where the thread was resolved between query and mutation)
                // doesn't kill the whole pass — we want best-effort cleanup.
                try {
                  await github.graphql(
                    `mutation($id: ID!) {
                       resolveReviewThread(input: { threadId: $id }) {
                         thread { id isResolved }
                       }
                     }`,
                    { id: thread.id },
                  );
                  resolved += 1;
                  core.info(`Resolved outdated vercel[bot] thread ${thread.id}`);
                } catch (err) {
                  errored += 1;
                  core.warning(
                    `Failed to resolve thread ${thread.id}: ${err.message ?? err}`,
                  );
                }
              }

              if (!page.pageInfo.hasNextPage) break;
              cursor = page.pageInfo.endCursor;
            }

            // Invariant: every scanned thread falls into exactly one bucket.
            //   scanned == resolved + skippedAlreadyResolved
            //            + skippedLive + skippedNonVercel + errored
            const accounted =
              resolved + skippedAlreadyResolved + skippedLive +
              skippedNonVercel + errored;
            if (accounted !== scanned) {
              core.warning(
                `Counter mismatch: scanned=${scanned}, accounted=${accounted}. ` +
                `A thread was reached without being categorized — please file a bug.`,
              );
            }

            const summary = (
              `scanned=${scanned}, resolved=${resolved}, ` +
              `skipped-already-resolved=${skippedAlreadyResolved}, ` +
              `skipped-live-vercel=${skippedLive}, ` +
              `skipped-non-vercel=${skippedNonVercel}, errored=${errored}`
            );
            core.notice(`Auto-resolve summary: ${summary}.`);

            // Surface a structured summary in the Actions run UI.
            await core.summary
              .addHeading('Auto-resolve outdated Vercel Agent threads')
              .addTable([
                [
                  { data: 'Metric', header: true },
                  { data: 'Count', header: true },
                ],
                ['Threads scanned', String(scanned)],
                ['Resolved (outdated vercel[bot])', String(resolved)],
                ['Skipped — already resolved', String(skippedAlreadyResolved)],
                ['Skipped — vercel[bot] but still live', String(skippedLive)],
                ['Skipped — non-vercel[bot] author', String(skippedNonVercel)],
                ['Errored during mutation', String(errored)],
              ])
              .write();
