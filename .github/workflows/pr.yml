name: PR Checks

# Required-status checks for every pull request and pushes to main.
# These gates exist because we shipped four production hotfixes in
# rapid succession and the actual root cause (an RSC boundary bug
# that `next build` catches but no one ran locally) only surfaced
# in production. Never again.
#
# Gates:
#   - typecheck: tsc --noEmit
#   - build:     next build (CRITICAL — this catches RSC boundary
#                bugs like the one in PR #115 that crashed prod with
#                `TypeError: n is not a function`)
#   - rsc:      static check for server components importing non-
#                component named exports from "use client" files
#   - migrate:   fresh-DB migration verification — applies every
#                migration to an empty Postgres + verifies idempotency
#
# All four are required. None is allowed to be flaky. If any becomes
# flaky, fix the underlying issue rather than disabling the check.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs when a new commit lands on the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck

  build:
    name: Next build
    runs-on: ubuntu-latest
    # Build needs to resolve "use client" boundaries. Without a real
    # DATABASE_URL in build scope it still completes — Next builds
    # the app graph and serializes RSC payloads at request time, not
    # build time. The RSC boundary bug from PR #115 is caught here.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
        env:
          # Stub values so Next can resolve env reads in module init.
          # Real values aren't needed: build doesn't execute request
          # handlers, just compiles the app graph.
          DATABASE_URL: "postgres://stub:stub@localhost:5432/stub"
          AUTH_SECRET: "ci-stub-secret-not-used-at-runtime"
          NEXTAUTH_URL: "http://localhost:3000"

  rsc-boundaries:
    name: RSC boundary check
    runs-on: ubuntu-latest
    # Static check — no DB, no build needed. Catches the bug pattern
    # where a server component imports a plain helper function from
    # a "use client" file. At build time, that import becomes a
    # Client Component reference. Calling it on the server throws
    # `TypeError: n is not a function` during RSC payload toJSON.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/check-rsc-boundaries.mjs

  isolation:
    name: Multi-tenant isolation check
    runs-on: ubuntu-latest
    # BL-19: static analyzer that asserts every server action touching
    # a tenant-scoped table (table with an `organization_id` column)
    # also includes an auth gate (requireAuth / requireCurrentOrg /
    # requireOrgAdmin / requireSuperadmin) AND references
    # `organizationId` in the query. Legitimate exceptions (token-
    # scoped public surfaces, etc.) live in .isolation-allow.json with
    # a documented reason.
    #
    # Static so it can run without a DB. Pairs with future runtime
    # tests that exercise actual cross-tenant query attempts.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/check-isolation.mjs

  migrations-fresh:
    name: Fresh-DB migration verification
    runs-on: ubuntu-latest
    # Applies every migration from scratch, then re-applies to verify
    # idempotency. Catches accidental cross-migration dependencies on
    # prior state — those pass on a developer's already-migrated DB but
    # break a fresh production / staging deploy.
    #
    # BL-QC-neon-migration-rewire: prefers the per-PR Neon branch
    # (created by the neon-branch workflow) when Neon is configured,
    # so the check runs against real production schema shape. Falls
    # back to the ephemeral `pgvector/pgvector:pg16` service for forks
    # and setups without Neon access — preserves the original behavior
    # so the check never silently degrades.
    #
    # Both modes verify the same two invariants (`apply cleanly` +
    # `idempotent re-apply`). The Neon mode additionally exercises the
    # migration against the production schema that already exists on
    # the branch.
    services:
      postgres:
        # Fallback target. Always boots (services run for the whole
        # job) but is unused when the Neon path resolves. pgvector
        # image because migration 0022 calls `CREATE EXTENSION vector`.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: forge
          POSTGRES_PASSWORD: forge
          POSTGRES_DB: forge_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci

      - name: Detect Neon configuration
        id: detect-neon
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
        run: |
          if [ -z "$NEON_API_KEY" ] || [ -z "$NEON_PROJECT_ID" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Neon not configured — fresh-DB check using ephemeral Postgres."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Neon configured — fresh-DB check using per-PR Neon branch."
          fi

      - name: Resolve Neon branch
        id: neon
        # Only for pull_request events — push-to-main has no PR number
        # and there's no per-PR branch to read.
        if: steps.detect-neon.outputs.configured == 'true' && github.event_name == 'pull_request'
        # create-branch-action is idempotent on `branch_name`: if the
        # neon-branch.yml workflow already created `pr-<number>`, this
        # call returns the existing branch's connection details rather
        # than failing. Parallel-safe.
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          parent: ${{ vars.NEON_BRANCH_PARENT || 'main' }}
          branch_name: pr-${{ github.event.pull_request.number }}
          api_key: ${{ secrets.NEON_API_KEY }}
          username: ${{ vars.NEON_USERNAME || 'forge' }}

      - name: Run fresh-DB migration check
        run: node scripts/check-migrations-fresh.mjs
        env:
          # Prefer the Neon branch URL when resolved; fall back to the
          # ephemeral service. The `||` operator treats an empty string
          # (skipped step) as falsy, so this works whether Neon ran or not.
          DATABASE_URL: ${{ steps.neon.outputs.db_url || 'postgres://forge:forge@localhost:5432/forge_ci' }}
