name: PR quality gates

# Tier-2 robotic pre-merge checks (BL-QC). Each job is independent and
# surfaces as a separate required status check on `main`, so they can be
# toggled individually in branch protection. Failing any gate blocks the
# merge — robotic discipline, not human discipline.
#
# Pair with:
#   - .github/CODEOWNERS — routes sensitive paths to a code-owner reviewer
#   - docs/PR_QUALITY.md — describes each gate + how to (legitimately) bypass
#   - .github/workflows/pr.yml — existing typecheck / build / RSC / isolation /
#     fresh-DB checks (these remain the floor; the gates here are additive)

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    # BL-QC-lint: `npm run lint` (next lint) against the Next.js +
    # TypeScript strict preset configured in .eslintrc.json. Catches
    # unused imports, exhaustive-deps misses, and other style issues
    # that tsc --noEmit doesn't enforce.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  pr-title-format:
    name: PR title format (conventional commits)
    runs-on: ubuntu-latest
    steps:
      - name: Check title matches conventional-commit shape
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Allowed types per https://www.conventionalcommits.org/ plus
          # the build / ci types we use in practice.
          PATTERN='^(feat|fix|chore|docs|refactor|perf|test|style|build|ci)(\([^)]+\))?: .+'
          if ! printf '%s' "$TITLE" | grep -qE "$PATTERN"; then
            {
              echo "::error::PR title must follow conventional-commit format: <type>(<scope>)?: <summary>"
              echo "Got:     $TITLE"
              echo "Allowed types: feat, fix, chore, docs, refactor, perf, test, style, build, ci"
              echo "Example: feat(audit): BL-13 — notifications rules engine schema"
            } >&2
            exit 1
          fi
          echo "Title OK: $TITLE"

  backlog-hygiene:
    name: Backlog hygiene (BL-N references must touch BACKLOG.md)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require docs/BACKLOG.md touched when title or body references a BL-N
        env:
          TITLE: ${{ github.event.pull_request.title }}
          BODY: ${{ github.event.pull_request.body }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          combined="$TITLE $BODY"
          # Match BL-12, BL-12c, BL-18-cleanup, BL-QC, etc.
          bl_refs=$(printf '%s' "$combined" | grep -oE 'BL-[A-Za-z0-9]+(-[A-Za-z0-9]+)?' | sort -u | tr '\n' ' ' || true)
          if [ -z "$bl_refs" ]; then
            echo "No BL references found — skipping backlog-hygiene check."
            exit 0
          fi
          echo "BL references: $bl_refs"
          git fetch origin "$BASE_REF" --depth=1
          if git diff --name-only "origin/$BASE_REF...HEAD" | grep -qE '^docs/BACKLOG\.md$'; then
            echo "docs/BACKLOG.md touched — backlog hygiene OK."
            exit 0
          fi
          {
            echo "::error::PR references $bl_refs but doesn't touch docs/BACKLOG.md."
            echo "Every PR that closes / advances a tracked backlog item must update the backlog entry."
            echo "If the BL reference in the title is incidental (not the focus of this PR), remove it."
          } >&2
          exit 1

  schema-migration-coupling:
    name: Schema / migration coupling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require a new drizzle/*.sql when src/db schema changes
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          git fetch origin "$BASE_REF" --depth=1
          changed=$(git diff --name-only "origin/$BASE_REF...HEAD")
          # Schema-side: any TS file under src/db/
          schema_changed=$(printf '%s\n' "$changed" | grep -E '^src/db/.*\.ts$' || true)
          # Migration-side: a new (or modified) numbered sql file under drizzle/
          migration_changed=$(printf '%s\n' "$changed" | grep -E '^drizzle/[0-9]+_.*\.sql$' || true)
          if [ -n "$schema_changed" ] && [ -z "$migration_changed" ]; then
            if printf '%s' "$LABELS" | grep -q '"schema-no-migration"'; then
              echo "Schema changed without migration, but label 'schema-no-migration' set — allowing."
              echo "Schema files touched:"
              printf '%s\n' "$schema_changed"
              exit 0
            fi
            {
              echo "::error::Schema changed but no new drizzle/[0-9]+_*.sql migration found."
              echo "Schema files touched:"
              printf '%s\n' "$schema_changed"
              echo ""
              echo "If this is type-only (no SQL impact), add the 'schema-no-migration' label and re-run this check."
            } >&2
            exit 1
          fi
          echo "Schema / migration coupling OK."

  diff-size-guard:
    name: Diff-size guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Cap diff at 1500 LOC (additions + deletions, lock files excluded)
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          git fetch origin "$BASE_REF" --depth=1
          loc=$(git diff "origin/$BASE_REF...HEAD" --numstat -- \
            ':(exclude)package-lock.json' \
            ':(exclude)pnpm-lock.yaml' \
            ':(exclude)yarn.lock' \
            | awk '{ a += $1; d += $2 } END { print (a + d) + 0 }')
          loc=${loc:-0}
          echo "Total LOC (added + deleted, excl. lock files): $loc"
          MAX=1500
          if [ "$loc" -gt "$MAX" ]; then
            if printf '%s' "$LABELS" | grep -q '"oversized-ok"'; then
              echo "PR is $loc LOC (over $MAX) but 'oversized-ok' label set — allowing."
              exit 0
            fi
            {
              echo "::error::PR is $loc LOC — exceeds soft cap of $MAX."
              echo "Split into smaller PRs, or add the 'oversized-ok' label and justify the size in the PR description."
            } >&2
            exit 1
          fi

  secret-scan:
    name: Secret scan (added lines)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Regex scan of newly-added non-doc lines
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch origin "$BASE_REF" --depth=1
          # Only lines starting with "+" (added) but not "+++" (file headers).
          # Skip markdown + test/spec/fixture paths so docs and fake data
          # don't trip the scan.
          new_lines=$(git diff "origin/$BASE_REF...HEAD" -- \
            ':(exclude)*.md' \
            ':(exclude)*.test.*' \
            ':(exclude)*.spec.*' \
            ':(exclude)**/fixtures/**' \
            | grep -E '^\+[^+]' || true)
          if [ -z "$new_lines" ]; then
            echo "No newly added non-doc lines to scan."
            exit 0
          fi
          patterns=(
            'AKIA[0-9A-Z]{16}'                            # AWS access key id
            'sk-[a-zA-Z0-9]{20,}'                          # generic API key (OpenAI / Anthropic shape)
            'sk_(live|test)_[a-zA-Z0-9]{24,}'             # Stripe secret key
            'ghp_[a-zA-Z0-9]{36}'                          # GitHub classic PAT
            'github_pat_[a-zA-Z0-9_]{82}'                  # GitHub fine-grained PAT
            'xox[baprs]-[0-9]+-[0-9]+-[a-zA-Z0-9]+'        # Slack bot/user/etc. token
            '-----BEGIN [A-Z ]*PRIVATE KEY-----'           # PEM private key
          )
          found=0
          for pat in "${patterns[@]}"; do
            matches=$(printf '%s' "$new_lines" | grep -E "$pat" || true)
            if [ -n "$matches" ]; then
              {
                echo "::error::Possible secret matching pattern: $pat"
                printf '%s\n' "$matches" | head -5
              } >&2
              found=1
            fi
          done
          if [ "$found" -eq 1 ]; then
            {
              echo ""
              echo "If these are genuinely false positives (docs / fixtures / example values), move them under *.md or */fixtures/* — those paths are excluded from this scan."
            } >&2
            exit 1
          fi
          echo "No secret patterns detected."

  drizzle-validate:
    name: Drizzle schema validate
    runs-on: ubuntu-latest
    # BL-QC-deeper: `drizzle-kit check` validates that the recorded
    # schema snapshots (drizzle/meta/*.json) are internally consistent
    # — no two migrations claim the same snapshot prefix, no orphan
    # entries, no journal/snapshot mismatch. Catches a class of
    # corruption that `Fresh-DB migration verification` (which only
    # runs the SQL) wouldn't surface.
    #
    # Doesn't replace the fresh-DB check — that's the gold-standard
    # validation since it executes the actual SQL against a real
    # Postgres. This is the cheap pre-flight.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx drizzle-kit check
        env:
          # drizzle-kit check doesn't connect; stub satisfies config validation.
          DATABASE_URL: "postgres://stub:stub@localhost:5432/stub"

  self-review-section:
    name: Pre-push self-review section
    runs-on: ubuntu-latest
    # BL-QC-self-review-gate — forces the PR body to include a filled-in
    # "Pre-push self-review" section. Verbal commitments to do a dry-run
    # against .vercel/agent.md categories were repeatedly skipped (cf.
    # #143 / #150 / #153 — same pattern, three PRs in a row). This gate
    # turns the commitment into a required artifact.
    #
    # Required behavior:
    #   - PR body must contain the literal "## Pre-push self-review"
    #     header
    #   - That section must contain a markdown table with one row per
    #     category from `.github/PULL_REQUEST_TEMPLATE.md`
    #   - Every row's Status column must be non-empty — the placeholder
    #     `<how>` token is treated as unfilled
    steps:
      - name: Verify Pre-push self-review section
        env:
          BODY: ${{ github.event.pull_request.body }}
        run: |
          # 1. Header must exist.
          if ! printf '%s' "$BODY" | grep -qE '^## Pre-push self-review *$'; then
            {
              echo "::error::PR body is missing the required '## Pre-push self-review' section."
              echo "Add the section per .github/PULL_REQUEST_TEMPLATE.md and fill in every row."
            } >&2
            exit 1
          fi

          # 2. Section must contain at least 5 table rows (loose floor —
          #    template has ~13; this catches an empty or truncated
          #    section without being brittle to row additions).
          section=$(printf '%s' "$BODY" | awk '
            /^## Pre-push self-review/ { capture = 1; next }
            /^## / && capture { capture = 0 }
            capture { print }
          ')
          row_count=$(printf '%s' "$section" | grep -cE '^\|.*\|$' || true)
          # Subtract 2 for the header + separator rows (|---|---|).
          row_count=$(( row_count - 2 ))
          if [ "$row_count" -lt 5 ]; then
            {
              echo "::error::Pre-push self-review section has too few rows ($row_count)."
              echo "Copy the table from .github/PULL_REQUEST_TEMPLATE.md and fill in every row."
            } >&2
            exit 1
          fi

          # 3. No row may leave the Status column as the literal
          #    placeholder `<how>` — that's the unfilled sentinel.
          unfilled=$(printf '%s' "$section" | grep -E '<how>' || true)
          if [ -n "$unfilled" ]; then
            {
              echo "::error::Pre-push self-review has unfilled rows (contain the '<how>' placeholder):"
              printf '%s\n' "$unfilled"
              echo "Replace <how> with either 'N/A' (category doesn't apply) or 'addressed: <description>' (category applied + how you handled it)."
            } >&2
            exit 1
          fi

          # 4. Every row must have a non-empty Status cell. A row looks
          #    like `| <concern> | <status> |` — we split on `|` and
          #    require the third column (index 2 after leading empty)
          #    to be non-blank.
          empty=$(printf '%s' "$section" | awk -F'|' '
            /^\|.*\|$/ {
              # Skip header (contains "Concern from") + separator (---).
              if ($2 ~ /Concern from/) next
              if ($2 ~ /^[ -]+$/) next
              # Trim whitespace from the Status column.
              gsub(/^[ \t]+|[ \t]+$/, "", $3)
              if ($3 == "") {
                print "  empty status for row:" $2
              }
            }
          ')
          if [ -n "$empty" ]; then
            {
              echo "::error::Pre-push self-review has rows with empty Status cells:"
              printf '%s\n' "$empty"
            } >&2
            exit 1
          fi

          echo "Pre-push self-review section OK ($row_count rows, all filled)."
